<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forge — Begin Your Legend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --parchment:#f4ede0;
  --parchment2:#ede0c8;
  --parchment3:#e0cead;
  --ink:#1a1008;
  --ink2:#3d2b10;
  --ink3:#6b4e2a;
  --crimson:#8b1a1a;
  --crimson2:#c0392b;
  --crimson-light:#f5e6e6;
  --gold:#b8860b;
  --gold2:#d4a017;
  --shadow:rgba(26,16,8,0.15);
  --display:'Cinzel',serif;
  --body:'Crimson Pro',serif;
}
html,body{height:100%;background:var(--ink);overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:var(--body)}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s}
.screen.active{opacity:1;pointer-events:all}

/* ── INTRO ── */
#screen-intro{flex-direction:column;background:var(--ink);overflow:hidden}
.intro-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%, #2d1a08 0%, #0a0603 70%)}
.intro-runes{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:120px;color:rgba(184,134,11,0.04);letter-spacing:40px;user-select:none;white-space:nowrap}
.intro-content{position:relative;text-align:center;padding:40px}
.intro-emblem{width:80px;height:80px;margin:0 auto 32px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--gold);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(184,134,11,0.3)}50%{box-shadow:0 0 0 16px rgba(184,134,11,0)}}
.intro-title{font-family:var(--display);font-size:clamp(28px,5vw,52px);font-weight:900;color:var(--parchment);letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;animation:fadeUp .8s ease both}
.intro-subtitle{font-family:var(--body);font-size:18px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-weight:300;margin-bottom:48px;animation:fadeUp .8s .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.intro-btn{font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;padding:16px 48px;cursor:pointer;transition:all .2s;animation:fadeUp .8s .4s ease both;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)}
.intro-btn:hover{background:var(--gold2);transform:translateY(-2px)}

/* ── SETTING SELECT ── */
#screen-settings{background:var(--parchment);flex-direction:column;overflow-y:auto;padding:40px 20px}
.settings-header{text-align:center;margin-bottom:48px}
.settings-title{font-family:var(--display);font-size:clamp(20px,4vw,36px);font-weight:700;color:var(--ink);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.settings-rule{width:120px;height:1px;background:var(--gold);margin:16px auto;position:relative}
.settings-rule::before,.settings-rule::after{content:'◆';position:absolute;top:-8px;color:var(--gold);font-size:10px}
.settings-rule::before{left:-16px}
.settings-rule::after{right:-16px}
.settings-sub{font-size:17px;color:var(--ink3);font-style:italic}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:960px;width:100%}
.setting-tile{background:var(--parchment2);border:1px solid var(--parchment3);padding:32px 28px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.setting-tile::before{content:'';position:absolute;inset:0;background:var(--crimson);opacity:0;transition:opacity .25s}
.setting-tile:hover::before{opacity:.04}
.setting-tile:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 12px 40px var(--shadow)}
.setting-tile.locked{opacity:.6;cursor:not-allowed}
.setting-tile.locked:hover{transform:none;box-shadow:none;border-color:var(--parchment3)}
.setting-tile.locked::before{display:none}
.tile-icon{font-size:36px;margin-bottom:16px}
.tile-name{font-family:var(--display);font-size:20px;font-weight:700;color:var(--ink);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.tile-desc{font-size:15px;color:var(--ink3);line-height:1.6;font-style:italic;margin-bottom:16px}
.tile-meta{display:flex;gap:12px;flex-wrap:wrap}
.tile-tag{font-size:11px;font-family:var(--display);letter-spacing:1px;color:var(--ink3);border:1px solid var(--parchment3);padding:3px 10px;text-transform:uppercase}
.tile-locked-badge{position:absolute;top:16px;right:16px;font-family:var(--display);font-size:9px;letter-spacing:2px;color:var(--ink3);border:1px solid var(--parchment3);padding:3px 8px;text-transform:uppercase}

/* ── QUESTION ── */
#screen-question{background:var(--parchment);flex-direction:column;overflow:hidden}
.question-wrap{width:100%;max-width:720px;padding:40px 24px;display:flex;flex-direction:column;min-height:100vh;justify-content:center}
.q-progress{display:flex;align-items:center;gap:12px;margin-bottom:48px}
.q-progress-track{flex:1;height:2px;background:var(--parchment3);position:relative}
.q-progress-fill{height:100%;background:var(--gold);transition:width .5s ease}
.q-progress-label{font-family:var(--display);font-size:11px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;white-space:nowrap}
.q-setting-label{font-family:var(--display);font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:20px}
.q-text{font-family:var(--display);font-size:clamp(18px,3vw,26px);font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:40px;position:relative;padding-left:24px}
.q-text::before{content:'"';position:absolute;left:0;top:-8px;font-size:48px;color:var(--gold);opacity:.4;font-family:var(--body);line-height:1}
.q-answers{display:flex;flex-direction:column;gap:12px}
.q-answer{background:none;border:1px solid var(--parchment3);padding:18px 24px;text-align:left;cursor:pointer;transition:all .2s;font-family:var(--body);font-size:16px;color:var(--ink2);line-height:1.5;position:relative;overflow:hidden}
.q-answer::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transition:transform .2s}
.q-answer:hover{border-color:var(--gold);background:rgba(184,134,11,0.05);color:var(--ink);padding-left:32px}
.q-answer:hover::before{transform:scaleY(1)}
.q-answer.selected{border-color:var(--crimson);background:var(--crimson-light);color:var(--ink);padding-left:32px}
.q-answer.selected::before{background:var(--crimson);transform:scaleY(1)}
.q-answer-letter{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-right:12px;text-transform:uppercase}
.q-nav{display:flex;justify-content:flex-start;margin-top:32px}
.q-back{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);background:none;border:1px solid var(--parchment3);padding:10px 24px;cursor:pointer;transition:all .2s}
.q-back:hover{border-color:var(--ink3);color:var(--ink)}
.q-answer.choosing{opacity:.5;pointer-events:none}
.q-answer.chosen{border-color:var(--crimson);background:var(--crimson-light);color:var(--ink);padding-left:32px}
.q-answer.chosen::before{background:var(--crimson);transform:scaleY(1)}
.q-fade{animation:qFadeIn .4s ease both}
@keyframes qFadeIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

/* ── TIE RESOLUTION ── */
#screen-tie{background:var(--parchment);flex-direction:column;overflow-y:auto;padding:40px 20px}
.tie-wrap{max-width:600px;width:100%;text-align:center}
.tie-title{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--ink);margin-bottom:12px}
.tie-sub{font-size:17px;color:var(--ink3);font-style:italic;margin-bottom:40px;line-height:1.6}
.tie-options{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.tie-option{background:none;border:1px solid var(--parchment3);padding:20px 28px;cursor:pointer;transition:all .2s;font-family:var(--body);font-size:17px;color:var(--ink2);text-align:left}
.tie-option:hover{border-color:var(--gold);background:rgba(184,134,11,0.06);color:var(--ink)}
.tie-option-name{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;color:var(--ink)}
.tie-option-desc{font-size:15px;color:var(--ink3);font-style:italic}
.tie-random{font-family:var(--display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);background:none;border:1px solid var(--parchment3);padding:12px 28px;cursor:pointer;transition:all .2s;width:100%}
.tie-random:hover{border-color:var(--ink3);color:var(--ink)}

/* ── REVEAL ── */
#screen-reveal{background:var(--ink);flex-direction:column;overflow-y:auto;padding:40px 20px}
.reveal-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%, #2d1a08 0%, #080503 70%)}
.reveal-wrap{position:relative;max-width:680px;width:100%;text-align:center}
.reveal-announce{font-family:var(--display);font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;animation:fadeUp .6s ease both}
.reveal-name{font-family:var(--display);font-size:clamp(28px,6vw,56px);font-weight:900;color:var(--parchment);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;animation:fadeUp .6s .2s ease both;text-shadow:0 0 60px rgba(184,134,11,0.3)}
.reveal-species{font-family:var(--display);font-size:16px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:40px;animation:fadeUp .6s .35s ease both}
.reveal-divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 40px;animation:fadeUp .6s .45s ease both}
.reveal-flavor{font-size:18px;color:var(--parchment3);font-style:italic;line-height:1.8;margin-bottom:48px;animation:fadeUp .6s .55s ease both;max-width:500px;margin-left:auto;margin-right:auto}
.reveal-attrs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px;animation:fadeUp .6s .65s ease both}
.attr-card{background:rgba(244,237,224,0.05);border:1px solid rgba(184,134,11,0.2);padding:20px 12px;text-align:center}
.attr-label{font-family:var(--display);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.attr-value{font-family:var(--display);font-size:32px;font-weight:700;color:var(--parchment);margin-bottom:4px}
.attr-bar{height:3px;background:rgba(244,237,224,0.1);border-radius:2px;overflow:hidden}
.attr-bar-fill{height:100%;background:var(--gold);border-radius:2px}
.reveal-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fadeUp .6s .75s ease both}
.reveal-btn{font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:14px 36px;cursor:pointer;transition:all .2s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)}
.reveal-btn-primary{color:var(--ink);background:var(--gold);border:none}
.reveal-btn-primary:hover{background:var(--gold2)}
.reveal-btn-ghost{color:var(--parchment3);background:none;border:1px solid rgba(244,237,224,0.2)}
.reveal-btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* ── DECORATIVE ── */
.corner{position:absolute;width:40px;height:40px;border-color:var(--gold);border-style:solid;opacity:.4}
.corner-tl{top:20px;left:20px;border-width:2px 0 0 2px}
.corner-tr{top:20px;right:20px;border-width:2px 2px 0 0}
.corner-bl{bottom:20px;left:20px;border-width:0 0 2px 2px}
.corner-br{bottom:20px;right:20px;border-width:0 2px 2px 0}
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-bg"></div>
  <div class="intro-runes">ᚠᚢᚦᚨᚱᚲ</div>
  <div class="intro-content">
    <div class="intro-emblem">⬡</div>
    <div class="intro-title">Forge</div>
    <div class="intro-subtitle">Your Legend Awaits</div>
    <button class="intro-btn" onclick="showScreen('screen-settings')">Begin</button>
  </div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<!-- SETTING SELECT -->
<div class="screen" id="screen-settings">
  <div style="width:100%;max-width:960px;padding:0 20px">
    <div class="settings-header">
      <div class="settings-title">Choose Your World</div>
      <div class="settings-rule"></div>
      <div class="settings-sub">Every legend begins with a realm. Which calls to you?</div>
    </div>
    <div class="settings-grid" id="settings-grid"></div>
  </div>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <div class="question-wrap" id="question-wrap"></div>
</div>

<!-- TIE RESOLUTION -->
<div class="screen" id="screen-tie">
  <div class="tie-wrap" id="tie-wrap"></div>
</div>

<!-- REVEAL -->
<div class="screen" id="screen-reveal">
  <div class="reveal-bg"></div>
  <div class="reveal-wrap" id="reveal-wrap"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>

<script>
// ── DATA ──
const SETTINGS = [
  {
    id:'fantasy',
    meta:{name:'Sword & Sorcery',description:'Ancient magic stirs. Kingdoms rise and fall by blade and spell. Your bloodline may decide the fate of the realm.',author:'official',locked:false},
    icon:'⚔️',
    tags:['Warriors','Magic','Kingdoms'],
    classes:[
      {id:'warrior',name:'Warrior',description:'Masters of physical combat and battlefield tactics.',attribute_contribution:{physical:8,mental:3,supernatural:1}},
      {id:'mage',name:'Mage',description:'Wielders of arcane power and ancient knowledge.',attribute_contribution:{physical:2,mental:5,supernatural:8}},
      {id:'rogue',name:'Rogue',description:'Cunning survivors who blend skill and shadow.',attribute_contribution:{physical:5,mental:6,supernatural:2}}
    ],
    species:[
      {id:'human',name:'Human',description:'Adaptable and resilient, humans excel in all paths.',attribute_contribution:{physical:3,mental:4,supernatural:2}},
      {id:'elf',name:'Elf',description:'Ancient and graceful, elves channel natural magic.',attribute_contribution:{physical:2,mental:3,supernatural:6}},
      {id:'dwarf',name:'Dwarf',description:'Stout and stubborn, dwarves endure where others fall.',attribute_contribution:{physical:6,mental:3,supernatural:1}}
    ],
    flavors:{
      warrior_human:"You move like a force of nature — where others hesitate, you act. The battlefield is your home and your body is your weapon.",
      warrior_elf:"Beneath your elegance lies iron resolve. You fight with a grace that deceives your enemies until it is far too late.",
      warrior_dwarf:"You are unmovable. Your ancestors carved mountains with their bare hands, and their stubborn blood runs hot in your veins.",
      mage_human:"Your hunger for knowledge is matched only by your adaptability. You bend every discipline to your will.",
      mage_elf:"Magic is not something you learned — it is something you remembered. The arcane feels like a mother tongue.",
      mage_dwarf:"Where others see mysticism, you see engineering. Your magic is precise, methodical, and terrifyingly effective.",
      rogue_human:"You read people like open books. Every room you enter has three exits — you found them before you sat down.",
      rogue_elf:"You move through the world like smoke. Patient, silent, present only when you choose to be.",
      rogue_dwarf:"You are the one they never see coming. Nobody suspects the dwarf. That is exactly how you like it."
    },
    questions:[
      {id:'q1',axis:'both',prompt:'A stranger collapses before you clutching a stolen artifact. What do you do?',answers:[
        {id:'a1',text:'Rush to their aid immediately.',weights:{class:{warrior:3,mage:1,rogue:2},species:{human:4,elf:2,dwarf:1}}},
        {id:'a2',text:'Examine the artifact first.',weights:{class:{warrior:0,mage:5,rogue:3},species:{human:1,elf:4,dwarf:2}}},
        {id:'a3',text:'Scan the area for who is chasing them.',weights:{class:{warrior:2,mage:2,rogue:5},species:{human:2,elf:3,dwarf:3}}}
      ]},
      {id:'q2',axis:'class',prompt:'Your party faces a locked door to the enemy stronghold. Your approach?',answers:[
        {id:'a1',text:'Kick it down.',weights:{class:{warrior:5,mage:1,rogue:0},species:{human:2,elf:1,dwarf:3}}},
        {id:'a2',text:'Decipher the runic seal on it.',weights:{class:{warrior:0,mage:5,rogue:2},species:{human:2,elf:4,dwarf:1}}},
        {id:'a3',text:'Find a hidden side entrance.',weights:{class:{warrior:1,mage:2,rogue:5},species:{human:3,elf:2,dwarf:1}}}
      ]},
      {id:'q3',axis:'species',prompt:'You discover an ancient shrine deep in the forest. What draws your attention first?',answers:[
        {id:'a1',text:'The craftsmanship of the stonework.',weights:{class:{warrior:3,mage:2,rogue:2},species:{human:4,elf:1,dwarf:5}}},
        {id:'a2',text:'The faint magical aura emanating from the altar.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:1,elf:5,dwarf:1}}},
        {id:'a3',text:'The offerings left by those who came before.',weights:{class:{warrior:2,mage:3,rogue:3},species:{human:3,elf:3,dwarf:3}}}
      ]},
      {id:'q4',axis:'class',prompt:'A warlord offers you wealth to fight in his army. You respond:',answers:[
        {id:'a1',text:'Accept — you were born for battle.',weights:{class:{warrior:5,mage:1,rogue:1},species:{human:3,elf:2,dwarf:3}}},
        {id:'a2',text:'Decline — but offer to advise him on strategy for a price.',weights:{class:{warrior:1,mage:4,rogue:3},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'Accept — then spend a week learning his secrets before disappearing.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q5',axis:'species',prompt:'Your village is suffering a harsh winter. How do you help?',answers:[
        {id:'a1',text:'Organize hunting parties and fortify shelters.',weights:{class:{warrior:4,mage:1,rogue:2},species:{human:4,elf:1,dwarf:5}}},
        {id:'a2',text:'Commune with the land to find where game has gone.',weights:{class:{warrior:1,mage:5,rogue:1},species:{human:1,elf:5,dwarf:1}}},
        {id:'a3',text:'Ration what remains and keep morale alive.',weights:{class:{warrior:2,mage:3,rogue:3},species:{human:5,elf:2,dwarf:2}}}
      ]},
      {id:'q6',axis:'class',prompt:'You are captured and thrown in a dungeon. Your escape plan:',answers:[
        {id:'a1',text:'Wait for the guards to get close, then overpower them.',weights:{class:{warrior:5,mage:1,rogue:2},species:{human:3,elf:2,dwarf:3}}},
        {id:'a2',text:'Study the cell for weaknesses — there is always a flaw.',weights:{class:{warrior:1,mage:5,rogue:3},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'You already loosened the window bars on day one.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q7',axis:'both',prompt:'A dying elder presses a sealed letter into your hand. What do you do?',answers:[
        {id:'a1',text:'Deliver it unopened — her wishes deserve respect.',weights:{class:{warrior:3,mage:1,rogue:1},species:{human:4,elf:3,dwarf:4}}},
        {id:'a2',text:'Read it — knowledge of what you carry protects you.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:2,elf:4,dwarf:1}}},
        {id:'a3',text:'Deliver it, but make a copy first.',weights:{class:{warrior:0,mage:3,rogue:5},species:{human:2,elf:2,dwarf:2}}}
      ]},
      {id:'q8',axis:'species',prompt:'You are lost in an enchanted forest that shifts around you. You:',answers:[
        {id:'a1',text:'Mark the trees and build a mental map systematically.',weights:{class:{warrior:3,mage:2,rogue:3},species:{human:3,elf:1,dwarf:5}}},
        {id:'a2',text:'Quiet your mind and listen to what the forest wants.',weights:{class:{warrior:1,mage:5,rogue:1},species:{human:1,elf:5,dwarf:0}}},
        {id:'a3',text:'Find high ground and look for landmarks.',weights:{class:{warrior:4,mage:2,rogue:3},species:{human:4,elf:2,dwarf:4}}}
      ]},
      {id:'q9',axis:'class',prompt:'A rival has publicly humiliated you at court. Your response:',answers:[
        {id:'a1',text:'Challenge them to single combat immediately.',weights:{class:{warrior:5,mage:1,rogue:1},species:{human:3,elf:2,dwarf:4}}},
        {id:'a2',text:'Say nothing — and begin researching their weaknesses.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'Smile, walk away, and ruin them quietly over the following month.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q10',axis:'species',prompt:'What does home mean to you?',answers:[
        {id:'a1',text:'The people you would bleed for.',weights:{class:{warrior:4,mage:2,rogue:2},species:{human:5,elf:2,dwarf:3}}},
        {id:'a2',text:'The old places that remember what the world once was.',weights:{class:{warrior:2,mage:4,rogue:2},species:{human:1,elf:5,dwarf:2}}},
        {id:'a3',text:'The halls your ancestors carved with their own hands.',weights:{class:{warrior:3,mage:2,rogue:2},species:{human:2,elf:1,dwarf:5}}}
      ]}
    ]
  },
  {
    id:'scifi',
    meta:{name:'Sci-Fi',description:'The galaxy is vast, indifferent, and dangerous. Corporations rule, stars are conquered, and your DNA may be your destiny.',author:'official',locked:true},
    icon:'🚀',
    tags:['Cybernetics','Starships','Factions']
  },
  {

// ── STATE ──
let state = {
  setting: null,
  currentQ: 0,
  answers: [],
  classScores: {},
  specScores: {},
  tieType: null,
  tieOptions: [],
  finalClass: null,
  finalSpecies: null
};

// ── SCREEN MANAGEMENT ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── SETTINGS SCREEN ──
function renderSettings(){
  const grid = document.getElementById('settings-grid');
  grid.innerHTML = SETTINGS.map(s => {
    const locked = s.meta.locked;
    return `<div class="setting-tile ${locked?'locked':''}" onclick="${locked?'':` selectSetting('${s.id}')`}">
      ${locked?`<div class="tile-locked-badge">Coming Soon</div>`:''}
      <div class="tile-icon">${s.icon}</div>
      <div class="tile-name">${s.meta.name}</div>
      <div class="tile-desc">${s.meta.description}</div>
      <div class="tile-meta">${(s.tags||[]).map(t=>`<span class="tile-tag">${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function selectSetting(id){
  state.setting = SETTINGS.find(s=>s.id===id);
  state.currentQ = 0;
  state.answers = [];
  state.classScores = {};
  state.specScores = {};
  state.setting.classes.forEach(c=>state.classScores[c.id]=0);
  state.setting.species.forEach(s=>state.specScores[s.id]=0);
  showScreen('screen-question');
  renderQuestion();
}

// ── QUESTION SCREEN ──
function renderQuestion(){
  const s = state.setting;
  const q = s.questions[state.currentQ];
  const total = s.questions.length;
  const num = state.currentQ + 1;

  document.getElementById('question-wrap').innerHTML = `
    <div class="q-fade">
      <div class="q-progress">
        <div class="q-progress-track"><div class="q-progress-fill" style="width:${Math.round((state.currentQ/total)*100)}%"></div></div>
        <div class="q-progress-label">${num} of ${total}</div>
      </div>
      <div class="q-setting-label">${s.meta.name}</div>
      <div class="q-text">${q.prompt}</div>
      <div class="q-answers">
        ${q.answers.map((a,i)=>`
          <button class="q-answer" onclick="selectAnswer(${i})">
            <span class="q-answer-letter">${String.fromCharCode(65+i)}.</span>${a.text}
          </button>`).join('')}
      </div>
      <div class="q-nav">
        ${state.currentQ > 0 ? `<button class="q-back" onclick="goBack()">← Back</button>` : ''}
      </div>
    </div>`;
}

function selectAnswer(idx){
  // flash the chosen answer, then advance
  document.querySelectorAll('.q-answer').forEach((el,i)=>{
    if(i===idx) el.classList.add('chosen');
    else el.classList.add('choosing');
  });

  setTimeout(()=>{
    const q = state.setting.questions[state.currentQ];
    const a = q.answers[idx];

    // tally scores and record answer for back navigation
    Object.entries(a.weights.class||{}).forEach(([k,v])=>{ if(state.classScores[k]!==undefined) state.classScores[k]+=v; });
    Object.entries(a.weights.species||{}).forEach(([k,v])=>{ if(state.specScores[k]!==undefined) state.specScores[k]+=v; });
    state.answers[state.currentQ] = idx;

    state.currentQ++;
    if(state.currentQ < state.setting.questions.length){
      renderQuestion();
    } else {
      resolveCharacter();
    }
  }, 320);
}

function goBack(){
  if(state.currentQ <= 0) return;
  state.currentQ--;

  // undo the scores from the answer we're backing away from
  const q = state.setting.questions[state.currentQ];
  const prevIdx = state.answers[state.currentQ];
  if(prevIdx !== undefined){
    const a = q.answers[prevIdx];
    Object.entries(a.weights.class||{}).forEach(([k,v])=>{ if(state.classScores[k]!==undefined) state.classScores[k]-=v; });
    Object.entries(a.weights.species||{}).forEach(([k,v])=>{ if(state.specScores[k]!==undefined) state.specScores[k]-=v; });
    state.answers[state.currentQ] = undefined;
  }

  renderQuestion();
}

// ── SCORING & RESOLUTION ──
function getTop(scores, entities){
  const sorted = entities.slice().sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const topScore = scores[sorted[0].id]||0;
  const tied = sorted.filter(e=>(scores[e.id]||0)===topScore);
  return { winner: sorted[0], tied, topScore };
}

function resolveCharacter(){
  const classResult = getTop(state.classScores, state.setting.classes);
  const specResult = getTop(state.specScores, state.setting.species);

  const classTied = classResult.tied.length > 1;
  const specTied = specResult.tied.length > 1;

  if(!classTied && !specTied){
    state.finalClass = classResult.winner;
    state.finalSpecies = specResult.winner;
    showReveal();
  } else {
    // resolve ties one at a time
    state._pendingClass = classTied ? null : classResult.winner;
    state._pendingSpecies = specTied ? null : specResult.winner;
    state._classTiedOptions = classTied ? classResult.tied : null;
    state._specTiedOptions = specTied ? specResult.tied : null;

    if(classTied){
      showTie('class', classResult.tied, ()=>{
        if(specTied){
          showTie('species', specResult.tied, ()=>showReveal());
        } else {
          state.finalSpecies = specResult.winner;
          showReveal();
        }
      });
    } else {
      state.finalClass = classResult.winner;
      showTie('species', specResult.tied, ()=>showReveal());
    }
  }
}

let _tieCallback = null;

function showTie(axis, options, callback){
  _tieCallback = callback;
  const label = axis === 'class' ? 'Calling' : 'Bloodline';
  const intro = axis === 'class'
    ? 'Your choices point to two equal callings. The path forward is yours to name.'
    : 'Your blood carries two ancient heritages in equal measure. Choose which runs truer.';

  document.getElementById('tie-wrap').innerHTML = `
    <div class="settings-rule" style="margin-bottom:32px"></div>
    <div class="tie-title">A Divided Fate</div>
    <div class="tie-sub">${intro}</div>
    <div class="tie-options">
      ${options.map(o=>`
        <button class="tie-option" onclick="resolveTie('${axis}','${o.id}')">
          <div class="tie-option-name">${o.name}</div>
          <div class="tie-option-desc">${o.description}</div>
        </button>`).join('')}
    </div>
    <button class="tie-random" onclick="resolveTie('${axis}','__random__')">Let fate decide ✦</button>`;

  showScreen('screen-tie');
}

function resolveTie(axis, id){
  const options = axis==='class' ? state._classTiedOptions : state._specTiedOptions;
  let chosen;
  if(id==='__random__'){
    chosen = options[Math.floor(Math.random()*options.length)];
  } else {
    chosen = options.find(o=>o.id===id);
  }
  if(axis==='class') state.finalClass = chosen;
  else state.finalSpecies = chosen;

  if(_tieCallback) _tieCallback();
}

// ── REVEAL ──
function showReveal(){
  const s = state.setting;
  const cls = state.finalClass;
  const sp = state.finalSpecies;
  const flavorKey = `${cls.id}_${sp.id}`;
  const flavor = (s.flavors||{})[flavorKey] || `You have been marked by fate as a ${cls.name} of ${sp.name} heritage. Your legend begins now.`;

  const p = cls.attribute_contribution.physical + sp.attribute_contribution.physical;
  const m = cls.attribute_contribution.mental + sp.attribute_contribution.mental;
  const su = cls.attribute_contribution.supernatural + sp.attribute_contribution.supernatural;
  const maxAttr = Math.max(p, m, su, 1);

  document.getElementById('reveal-wrap').innerHTML = `
    <div class="reveal-announce">Your fate is sealed</div>
    <div class="reveal-name">${cls.name}</div>
    <div class="reveal-species">of ${sp.name} heritage · ${s.meta.name}</div>
    <div class="reveal-divider"></div>
    <div class="reveal-flavor">${flavor}</div>
    <div class="reveal-attrs">
      <div class="attr-card">
        <div class="attr-label">Physical</div>
        <div class="attr-value">${p}</div>
        <div class="attr-bar"><div class="attr-bar-fill" style="width:${Math.round((p/maxAttr)*100)}%"></div></div>
      </div>
      <div class="attr-card">
        <div class="attr-label">Mental</div>
        <div class="attr-value">${m}</div>
        <div class="attr-bar"><div class="attr-bar-fill" style="width:${Math.round((m/maxAttr)*100)}%"></div></div>
      </div>
      <div class="attr-card">
        <div class="attr-label">Supernatural</div>
        <div class="attr-value">${su}</div>
        <div class="attr-bar"><div class="attr-bar-fill" style="width:${Math.round((su/maxAttr)*100)}%"></div></div>
      </div>
    </div>
    <div class="reveal-actions">
      <button class="reveal-btn reveal-btn-primary" onclick="beginGame()">Enter the World</button>
      <button class="reveal-btn reveal-btn-ghost" onclick="restartFlow()">Try Again</button>
    </div>`;

  showScreen('screen-reveal');
}

function beginGame(){
  alert(`Game engine coming soon!\n\nYour character: ${state.finalClass.name} (${state.finalSpecies.name})\nReady to idle.`);
}

function restartFlow(){
  showScreen('screen-settings');
}

// ── INIT ──
renderSettings();
</script>
