<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forge — Scenario Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg2:#12121a;
  --bg3:#1a1a26;
  --bg4:#22223a;
  --border:#2a2a40;
  --border2:#3a3a58;
  --text:#e8e8f0;
  --text2:#9090b0;
  --text3:#5a5a78;
  --accent:#7c6af7;
  --accent2:#a594ff;
  --accent-bg:#1e1b3a;
  --green:#3dd68c;
  --green-bg:#0d2b1e;
  --red:#f25c5c;
  --red-bg:#2b0d0d;
  --amber:#f0a429;
  --amber-bg:#2b1e05;
  --mono:'Space Mono',monospace;
  --display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);font-family:var(--mono)}
.topbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.topbar-nav{display:flex;gap:4px;flex:1}
.nav-btn{background:none;border:none;color:var(--text2);font-family:var(--display);font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent)}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-family:var(--display);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;letter-spacing:.2px}
.btn-ghost{background:none;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-danger{background:none;border-color:var(--border2);color:var(--text2)}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.btn-success{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.btn-success:hover{background:var(--green);color:#0a1a12}
.btn-sm{padding:4px 10px;font-size:12px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:16px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:8px 8px 4px;font-family:var(--mono)}
.setting-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;position:relative}
.setting-card:hover{border-color:var(--border2)}
.setting-card.active{border-color:var(--accent);background:var(--accent-bg)}
.setting-card-name{font-size:14px;font-weight:700;margin-bottom:2px}
.setting-card-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.setting-card-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:4px;font-family:var(--mono)}
.badge-official{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent)}
.badge-custom{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.badge-locked{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber)}
.content{flex:1;overflow-y:auto;padding:24px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.section-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.section-title{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);font-family:var(--mono)}
.section-body{padding:18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:var(--mono)}
.field input,.field textarea,.field select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--display);font-size:13px;padding:8px 12px;outline:none;transition:border .15s;width:100%}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field select option{background:var(--bg3)}
.attr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.attr-input{display:flex;flex-direction:column;gap:4px}
.attr-input label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:var(--mono)}
.attr-input input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--accent2);font-family:var(--mono);font-size:14px;padding:6px 10px;outline:none;text-align:center;width:100%}
.attr-input input:focus{border-color:var(--accent)}
.entity-list{display:flex;flex-direction:column;gap:8px}
.entity-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;transition:border .15s}
.entity-item:hover{border-color:var(--border2)}
.entity-info{flex:1;min-width:0}
.entity-name{font-size:14px;font-weight:700;margin-bottom:2px}
.entity-desc{font-size:12px;color:var(--text2);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entity-attrs{display:flex;gap:6px;margin-top:6px}
.attr-pill{font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:4px}
.attr-p{background:#1a2635;color:#7ab4f5;border:1px solid #2a4060}
.attr-m{background:#1e1a35;color:#a594ff;border:1px solid #3a2a60}
.attr-s{background:#0d2820;color:#3dd68c;border:1px solid #1a4a30}
.entity-actions{display:flex;gap:4px;flex-shrink:0}
.q-list{display:flex;flex-direction:column;gap:10px}
.q-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border .15s}
.q-item:hover{border-color:var(--border2)}
.q-item.expanded{border-color:var(--accent)}
.q-header{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.q-num{font-size:11px;font-family:var(--mono);color:var(--text3);font-weight:700;min-width:28px}
.q-prompt{font-size:13px;flex:1;line-height:1.4}
.q-axis-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-family:var(--mono);flex-shrink:0}
.axis-class{background:#1a2635;color:#7ab4f5;border:1px solid #2a4060}
.axis-species{background:#1a2635;color:#3dd68c;border:1px solid #1a4a30}
.axis-both{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent)}
.q-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.answer-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.answer-item{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.answer-text-row{display:flex;gap:8px;margin-bottom:8px}
.answer-text-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--display);font-size:12px;padding:6px 10px;outline:none}
.answer-text-row input:focus{border-color:var(--accent)}
.weight-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.weight-cell{display:flex;flex-direction:column;gap:3px}
.weight-cell label{font-size:9px;font-family:var(--mono);color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weight-cell input{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12px;padding:4px;outline:none;text-align:center;width:100%}
.weight-cell input:focus{border-color:var(--accent)}
.weight-divider{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.weight-divider::before,.weight-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.score-viz{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.score-axis{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px}
.score-axis-title{font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.score-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.score-bar-label{font-size:12px;font-weight:700;min-width:70px;color:var(--text2)}
.score-bar-track{flex:1;height:20px;background:var(--bg4);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .3s;display:flex;align-items:center;padding-left:8px}
.score-bar-val{font-size:10px;font-family:var(--mono);font-weight:700;color:#fff}
.score-bar-fill.c1{background:var(--accent)}
.score-bar-fill.c2{background:#7ab4f5}
.score-bar-fill.c3{background:var(--green)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:13px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.toggle-label{font-size:13px;color:var(--text2)}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg4);border:1px solid var(--border2);border-radius:11px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent-bg);border-color:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px);background:var(--accent2)}
.attr-pill{font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:4px}
.attr-p{background:#1a2635;color:#7ab4f5;border:1px solid #2a4060}
.attr-m{background:#1e1a35;color:#a594ff;border:1px solid #3a2a60}
.attr-s{background:#0d2820;color:#3dd68c;border:1px solid #1a4a30}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);padding:12px 18px;border-radius:8px;font-size:13px;font-family:var(--mono);font-weight:700;z-index:999;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">⬡ Forge</div>
    <div class="topbar-sep"></div>
    <div class="topbar-nav" id="topnav"></div>
    <div class="topbar-actions" id="topactions"></div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEFAULT_SETTINGS = [
  {
    id:'fantasy',version:'1.0.0',
    meta:{name:'Sword & Sorcery',description:'A world of warriors, wizards, and ancient magic.',author:'official',created:'2026-06-04',locked:false,thumbnail:'',currency_name:'Gold'},
    classes:[
      {id:'warrior',name:'Warrior',description:'Masters of physical combat and battlefield tactics.',attribute_contribution:{physical:8,mental:3,supernatural:1}},
      {id:'mage',name:'Mage',description:'Wielders of arcane power and ancient knowledge.',attribute_contribution:{physical:2,mental:5,supernatural:8}},
      {id:'rogue',name:'Rogue',description:'Cunning survivors who blend skill and shadow.',attribute_contribution:{physical:5,mental:6,supernatural:2}}
    ],
    species:[
      {id:'human',name:'Human',description:'Adaptable and resilient, humans excel in all paths.',attribute_contribution:{physical:3,mental:4,supernatural:2}},
      {id:'elf',name:'Elf',description:'Ancient and graceful, elves channel natural magic.',attribute_contribution:{physical:2,mental:3,supernatural:6}},
      {id:'dwarf',name:'Dwarf',description:'Stout and stubborn, dwarves endure where others fall.',attribute_contribution:{physical:6,mental:3,supernatural:1}}
    ],
    questions:[
      {id:'q1',axis:'both',prompt:'A stranger collapses before you clutching a stolen artifact. What do you do?',answers:[
        {id:'a1',text:'Rush to their aid immediately.',weights:{class:{warrior:3,mage:1,rogue:2},species:{human:4,elf:2,dwarf:1}}},
        {id:'a2',text:'Examine the artifact first.',weights:{class:{warrior:0,mage:5,rogue:3},species:{human:1,elf:4,dwarf:2}}},
        {id:'a3',text:'Scan the area for who is chasing them.',weights:{class:{warrior:2,mage:2,rogue:5},species:{human:2,elf:3,dwarf:3}}}
      ]},
      {id:'q2',axis:'class',prompt:'Your party faces a locked door to the enemy stronghold. Your approach?',answers:[
        {id:'a1',text:'Kick it down.',weights:{class:{warrior:5,mage:1,rogue:0},species:{human:2,elf:1,dwarf:3}}},
        {id:'a2',text:'Decipher the runic seal on it.',weights:{class:{warrior:0,mage:5,rogue:2},species:{human:2,elf:4,dwarf:1}}},
        {id:'a3',text:'Find a hidden side entrance.',weights:{class:{warrior:1,mage:2,rogue:5},species:{human:3,elf:2,dwarf:1}}}
      ]},
      {id:'q3',axis:'species',prompt:'You discover an ancient shrine deep in the forest. What draws your attention first?',answers:[
        {id:'a1',text:'The craftsmanship of the stonework.',weights:{class:{warrior:3,mage:2,rogue:2},species:{human:4,elf:1,dwarf:5}}},
        {id:'a2',text:'The faint magical aura emanating from the altar.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:1,elf:5,dwarf:1}}},
        {id:'a3',text:'The offerings left by those who came before.',weights:{class:{warrior:2,mage:3,rogue:3},species:{human:3,elf:3,dwarf:3}}}
      ]},
      {id:'q4',axis:'class',prompt:'A warlord offers you wealth to fight in his army. You respond:',answers:[
        {id:'a1',text:'Accept — you were born for battle.',weights:{class:{warrior:5,mage:1,rogue:1},species:{human:3,elf:2,dwarf:3}}},
        {id:'a2',text:'Decline — but offer to advise him on strategy for a price.',weights:{class:{warrior:1,mage:4,rogue:3},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'Accept — then spend a week learning his secrets before disappearing.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q5',axis:'species',prompt:'Your village is suffering a harsh winter. How do you help?',answers:[
        {id:'a1',text:'Organize hunting parties and fortify shelters.',weights:{class:{warrior:4,mage:1,rogue:2},species:{human:4,elf:1,dwarf:5}}},
        {id:'a2',text:'Commune with the land to find where game has gone.',weights:{class:{warrior:1,mage:5,rogue:1},species:{human:1,elf:5,dwarf:1}}},
        {id:'a3',text:'Ration what remains and keep morale alive.',weights:{class:{warrior:2,mage:3,rogue:3},species:{human:5,elf:2,dwarf:2}}}
      ]},
      {id:'q6',axis:'class',prompt:'You are captured and thrown in a dungeon. Your escape plan:',answers:[
        {id:'a1',text:'Wait for the guards to get close, then overpower them.',weights:{class:{warrior:5,mage:1,rogue:2},species:{human:3,elf:2,dwarf:3}}},
        {id:'a2',text:'Study the cell for weaknesses — there is always a flaw.',weights:{class:{warrior:1,mage:5,rogue:3},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'You already loosened the window bars on day one.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q7',axis:'both',prompt:'A dying elder presses a sealed letter into your hand. What do you do?',answers:[
        {id:'a1',text:'Deliver it unopened — her wishes deserve respect.',weights:{class:{warrior:3,mage:1,rogue:1},species:{human:4,elf:3,dwarf:4}}},
        {id:'a2',text:'Read it — knowledge of what you carry protects you.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:2,elf:4,dwarf:1}}},
        {id:'a3',text:'Deliver it, but make a copy first.',weights:{class:{warrior:0,mage:3,rogue:5},species:{human:2,elf:2,dwarf:2}}}
      ]},
      {id:'q8',axis:'species',prompt:'You are lost in an enchanted forest that shifts around you. You:',answers:[
        {id:'a1',text:'Mark the trees and build a mental map systematically.',weights:{class:{warrior:3,mage:2,rogue:3},species:{human:3,elf:1,dwarf:5}}},
        {id:'a2',text:'Quiet your mind and listen to what the forest wants.',weights:{class:{warrior:1,mage:5,rogue:1},species:{human:1,elf:5,dwarf:0}}},
        {id:'a3',text:'Find high ground and look for landmarks.',weights:{class:{warrior:4,mage:2,rogue:3},species:{human:4,elf:2,dwarf:4}}}
      ]},
      {id:'q9',axis:'class',prompt:'A rival has publicly humiliated you at court. Your response:',answers:[
        {id:'a1',text:'Challenge them to single combat immediately.',weights:{class:{warrior:5,mage:1,rogue:1},species:{human:3,elf:2,dwarf:4}}},
        {id:'a2',text:'Say nothing — and begin researching their weaknesses.',weights:{class:{warrior:1,mage:5,rogue:2},species:{human:3,elf:3,dwarf:2}}},
        {id:'a3',text:'Smile, walk away, and ruin them quietly over the following month.',weights:{class:{warrior:0,mage:2,rogue:5},species:{human:3,elf:3,dwarf:1}}}
      ]},
      {id:'q10',axis:'species',prompt:'What does home mean to you?',answers:[
        {id:'a1',text:'The people you would bleed for.',weights:{class:{warrior:4,mage:2,rogue:2},species:{human:5,elf:2,dwarf:3}}},
        {id:'a2',text:'The old places that remember what the world once was.',weights:{class:{warrior:2,mage:4,rogue:2},species:{human:1,elf:5,dwarf:2}}},
        {id:'a3',text:'The halls your ancestors carved with their own hands.',weights:{class:{warrior:3,mage:2,rogue:2},species:{human:2,elf:1,dwarf:5}}}
      ]}
    ]
  },
  {
    id:'scifi',version:'1.0.0',
    meta:{name:'Sci-Fi',description:'A future of starships, cybernetics, and galactic conflict.',author:'official',created:'2026-06-04',locked:true,thumbnail:'',currency_name:'Credits'},
    classes:[
      {id:'soldier',name:'Soldier',description:'Augmented warriors trained for frontline combat.',attribute_contribution:{physical:8,mental:3,supernatural:1}},
      {id:'hacker',name:'Hacker',description:'Digital ghosts who bend systems to their will.',attribute_contribution:{physical:2,mental:8,supernatural:3}},
      {id:'pilot',name:'Pilot',description:'Elite operators who push machines to their limits.',attribute_contribution:{physical:4,mental:5,supernatural:3}}
    ],
    species:[
      {id:'human',name:'Human',description:'Baseline but adaptable across all enhancements.',attribute_contribution:{physical:3,mental:4,supernatural:2}},
      {id:'synthetic',name:'Synthetic',description:'Artificial intelligences in human-shaped shells.',attribute_contribution:{physical:4,mental:6,supernatural:2}},
      {id:'psionic',name:'Psionic',description:'Evolved humans with latent mental powers.',attribute_contribution:{physical:1,mental:4,supernatural:7}}
    ],
    questions:[]
  },
  {
    id:'horror',version:'1.0.0',
    meta:{name:'Horror',description:'Something ancient stirs in the dark. Sanity is fragile, monsters are real, and survival is never guaranteed.',author:'official',created:'2026-06-05',locked:false,thumbnail:'',currency_name:'Infamy'},
    classes:[
      {id:'stalker',name:'Stalker',description:'Patient predators who hunt from shadow. They win before the fight begins.',attribute_contribution:{physical:2,mental:6,supernatural:4}},
      {id:'brawler',name:'Brawler',description:'Raw aggression incarnate. They take the hit and keep coming.',attribute_contribution:{physical:8,mental:2,supernatural:2}},
      {id:'tank',name:'Tank',description:'Immovable. Unbreakable. They stand between the dark and everything worth protecting.',attribute_contribution:{physical:6,mental:2,supernatural:5}}
    ],
    species:[
      {id:'vampire',name:'Vampire',description:'Predatory elegance wrapped in centuries of cunning. They are the apex of what horror can become.',attribute_contribution:{physical:2,mental:5,supernatural:7}},
      {id:'werewolf',name:'Werewolf',description:'Primal fury barely contained in human skin. When the beast emerges, nothing stands.',attribute_contribution:{physical:7,mental:3,supernatural:2}},
      {id:'zombie',name:'Zombie',description:'They should be dead. They keep moving anyway. Relentless, rotting, supernaturally wrong.',attribute_contribution:{physical:5,mental:1,supernatural:8}}
    ],
    questions:[
      {id:'q1',axis:'both',prompt:'You hear something moving in the walls of the house. It has been there for three nights. Tonight it sounds closer. What do you do?',answers:[

let state = {
  view:'settings',
  settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)),
  activeSettingId: 'fantasy',
  expandedQuestion: null
};

function getActiveSetting(){ return state.settings.find(s=>s.id===state.activeSettingId); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=`<i class="ti ti-check"></i>${msg}`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function exportSetting(setting){
  const blob=new Blob([JSON.stringify({setting},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${setting.id}-setting.json`;
  a.click();
  showToast(`Exported ${setting.meta.name}`);
}

function importSetting(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const s=data.setting||data;
        if(!s.id||!s.meta||!s.classes||!s.species||!s.questions)throw new Error('Invalid schema');
        const existing=state.settings.findIndex(x=>x.id===s.id);
        if(existing>=0)state.settings[existing]=s;
        else state.settings.push(s);
        state.activeSettingId=s.id;
        render();
        showToast(`Imported ${s.meta.name}`);
      }catch(err){alert('Invalid config file: '+err.message)}
    };
    r.readAsText(f);
  };
  inp.click();
}

function newSetting(){
  const id='custom_'+Date.now();
  const s={
    id,version:'1.0.0',
    meta:{name:'New Setting',description:'',author:'custom',created:new Date().toISOString().split('T')[0],locked:false,thumbnail:'',currency_name:'Gold'},
    classes:[
      {id:'class1',name:'Class 1',description:'',attribute_contribution:{physical:5,mental:5,supernatural:5}},
      {id:'class2',name:'Class 2',description:'',attribute_contribution:{physical:5,mental:5,supernatural:5}},
      {id:'class3',name:'Class 3',description:'',attribute_contribution:{physical:5,mental:5,supernatural:5}}
    ],
    species:[
      {id:'species1',name:'Species 1',description:'',attribute_contribution:{physical:3,mental:3,supernatural:3}},
      {id:'species2',name:'Species 2',description:'',attribute_contribution:{physical:3,mental:3,supernatural:3}},
      {id:'species3',name:'Species 3',description:'',attribute_contribution:{physical:3,mental:3,supernatural:3}}
    ],
    questions:[]
  };
  state.settings.push(s);
  state.activeSettingId=id;
  state.view='editor';
  render();
}

function addQuestion(){
  const s=getActiveSetting();
  if(!s)return;
  const qid='q'+(s.questions.length+1);
  const classWeights={};s.classes.forEach(c=>classWeights[c.id]=0);
  const specWeights={};s.species.forEach(sp=>specWeights[sp.id]=0);
  s.questions.push({
    id:qid,axis:'both',prompt:'',
    answers:[
      {id:'a1',text:'',weights:{class:{...classWeights},species:{...specWeights}}},
      {id:'a2',text:'',weights:{class:{...classWeights},species:{...specWeights}}},
      {id:'a3',text:'',weights:{class:{...classWeights},species:{...specWeights}}}
    ]
  });
  state.expandedQuestion=qid;
  render();
}

function addAnswer(qIdx){
  const s=getActiveSetting();
  const q=s.questions[qIdx];
  const classWeights={};s.classes.forEach(c=>classWeights[c.id]=0);
  const specWeights={};s.species.forEach(sp=>specWeights[sp.id]=0);
  q.answers.push({id:'a'+(q.answers.length+1),text:'',weights:{class:{...classWeights},species:{...specWeights}}});
  render();
}

function removeAnswer(qIdx,aIdx){
  const s=getActiveSetting();
  if(s.questions[qIdx].answers.length<=2)return;
  s.questions[qIdx].answers.splice(aIdx,1);
  render();
}

function removeQuestion(qIdx){
  const s=getActiveSetting();
  s.questions.splice(qIdx,1);
  state.expandedQuestion=null;
  render();
}

function computeScores(){
  const s=getActiveSetting();
  if(!s||!s.questions.length)return null;
  const classScores={};s.classes.forEach(c=>classScores[c.id]=0);
  const specScores={};s.species.forEach(sp=>specScores[sp.id]=0);
  s.questions.forEach(q=>{
    q.answers.forEach(a=>{
      Object.entries(a.weights.class||{}).forEach(([k,v])=>{if(classScores[k]!==undefined)classScores[k]+=(v||0)});
      Object.entries(a.weights.species||{}).forEach(([k,v])=>{if(specScores[k]!==undefined)specScores[k]+=(v||0)});
    });
  });
  return{classScores,specScores};
}

function renderSidebar(){
  const el=document.getElementById('sidebar');
  let html=`<div class="sidebar-label">Settings</div>`;
  state.settings.forEach(s=>{
    const active=s.id===state.activeSettingId?'active':'';
    const badgeClass=s.meta.locked?'badge-locked':s.meta.author==='official'?'badge-official':'badge-custom';
    const badgeText=s.meta.locked?'locked':s.meta.author==='official'?'official':'custom';
    html+=`<div class="setting-card ${active}" onclick="selectSetting('${s.id}')">
      <div class="setting-card-badge ${badgeClass}">${badgeText}</div>
      <div class="setting-card-name">${s.meta.name}</div>
      <div class="setting-card-meta">${s.classes.length} classes · ${s.species.length} species · ${s.questions.length} q</div>
    </div>`;
  });
  html+=`<div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
    <button class="btn btn-ghost" onclick="newSetting()" style="width:100%;justify-content:center"><i class="ti ti-plus" aria-hidden="true"></i>New setting</button>
    <button class="btn btn-ghost" onclick="importSetting()" style="width:100%;justify-content:center"><i class="ti ti-upload" aria-hidden="true"></i>Import JSON</button>
  </div>`;
  el.innerHTML=html;
}

function selectSetting(id){
  state.activeSettingId=id;
  state.view='editor';

}

function renderTopNav(){

function renderQuestions(){
  const s=getActiveSetting();
  if(!s)return`<div class="empty-state"><div class="empty-icon"><i class="ti ti-help"></i></div><div class="empty-text">Select a setting first</div></div>`;
  const minQ=9,recQ=10,maxQ=15;
  const count=s.questions.length;
  const statusColor=count<minQ?'var(--red)':count===recQ?'var(--green)':count>maxQ?'var(--amber)':'var(--text2)';
  const statusMsg=count<minQ?`${minQ-count} more needed (minimum ${minQ})`:count===recQ?'Perfect — 10 questions recommended':count>maxQ?'Consider trimming for best player experience':`${count} questions — optimal range`;
  return`
  <div class="page-header">
    <div><div class="page-title">Questions</div><div class="page-sub" style="color:${statusColor}">${statusMsg}</div></div>
    <button class="btn btn-primary" onclick="addQuestion()"><i class="ti ti-plus" aria-hidden="true"></i>Add question</button>

          </div>
          <div style="display:flex;justify-content:space-between;margin-top:10px">
            <button class="btn btn-ghost btn-sm" onclick="addAnswer(${qi})"><i class="ti ti-plus" aria-hidden="true"></i>Add answer</button>
            <button class="btn btn-danger btn-sm" onclick="removeQuestion(${qi})"><i class="ti ti-trash" aria-hidden="true"></i>Remove question</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function renderVisualizer(){
  const s=getActiveSetting();
  if(!s)return`<div class="empty-state"><div class="empty-icon"><i class="ti ti-chart-bar"></i></div><div class="empty-text">Select a setting first</div></div>`;
  const scores=computeScores();
  const maxClass=scores?Math.max(...Object.values(scores.classScores),1):1;
  const maxSpec=scores?Math.max(...Object.values(scores.specScores),1):1;
  const colors=['c1','c2','c3'];
  return`
  <div class="page-header">
    <div><div class="page-title">Score Visualizer</div><div class="page-sub">Cumulative weight totals across all questions and answers</div></div>
  </div>
  ${!scores||s.questions.length===0?`<div class="empty-state"><div class="empty-icon"><i class="ti ti-chart-bar"></i></div><div class="empty-text">Add questions to see score distribution</div></div>`:`
  <div class="score-viz">
    <div class="score-axis">
      <div class="score-axis-title">Class axis</div>
      ${s.classes.map((c,i)=>{
        const val=scores.classScores[c.id]||0;
        const pct=Math.round((val/maxClass)*100);
        return`<div class="score-bar-row">
          <div class="score-bar-label">${c.name}</div>
          <div class="score-bar-track"><div class="score-bar-fill ${colors[i%3]}" style="width:${pct}%"><span class="score-bar-val">${val}</span></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="score-axis">
      <div class="score-axis-title">Species axis</div>
      ${s.species.map((sp,i)=>{
        const val=scores.specScores[sp.id]||0;
        const pct=Math.round((val/maxSpec)*100);
        return`<div class="score-bar-row">
          <div class="score-bar-label">${sp.name}</div>
          <div class="score-bar-track"><div class="score-bar-fill ${colors[i%3]}" style="width:${pct}%"><span class="score-bar-val">${val}</span></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="section" style="margin-top:16px">
    <div class="section-header"><span class="section-title">Permutation matrix</span></div>
    <div class="section-body">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr>
              <td style="padding:6px 10px;color:var(--text3);font-family:var(--mono);font-size:10px"></td>
              ${s.species.map(sp=>`<td style="padding:6px 10px;color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:center">${sp.name}</td>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${s.classes.map(c=>`<tr>
              <td style="padding:6px 10px;color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px">${c.name}</td>
              ${s.species.map(sp=>{
                const p=c.attribute_contribution.physical+sp.attribute_contribution.physical;
                const m=c.attribute_contribution.mental+sp.attribute_contribution.mental;
                const su=c.attribute_contribution.supernatural+sp.attribute_contribution.supernatural;
                return`<td style="padding:6px 8px;text-align:center">
                  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px">
                    <div style="font-size:11px;font-weight:700;margin-bottom:4px">${c.name} ${sp.name}</div>
                    <div style="display:flex;gap:4px;justify-content:center">
                      <span class="attr-pill attr-p">P:${p}</span>
                      <span class="attr-pill attr-m">M:${m}</span>
                      <span class="attr-pill attr-s">S:${su}</span>
                    </div>
                  </div>
                </td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`}`;
}

function toggleQuestion(id){ state.expandedQuestion=state.expandedQuestion===id?null:id; render(); }
function updateMeta(k,v){ const s=getActiveSetting(); if(s){ s.meta[k]=v; if(k==='name')renderSidebar(); } }
function updateId(v){ const s=getActiveSetting(); if(s)s.id=v; }
function updateVersion(v){ const s=getActiveSetting(); if(s)s.version=v; }
function toggleLock(){ const s=getActiveSetting(); if(s){ s.meta.locked=!s.meta.locked; renderSidebar(); render(); } }
function deleteSetting(id){
  if(!confirm('Delete this setting? This cannot be undone.'))return;
  state.settings=state.settings.filter(s=>s.id!==id);
  state.activeSettingId=state.settings[0]?.id||null;
  render();
}
function updateClass(i,k,v){ const s=getActiveSetting(); if(s)s.classes[i][k]=v; }
function updateClassAttr(i,k,v){ const s=getActiveSetting(); if(s)s.classes[i].attribute_contribution[k]=v; }
function updateSpecies(i,k,v){ const s=getActiveSetting(); if(s)s.species[i][k]=v; }
function updateSpeciesAttr(i,k,v){ const s=getActiveSetting(); if(s)s.species[i].attribute_contribution[k]=v; }
function updateQuestion(qi,k,v){ const s=getActiveSetting(); if(s){ s.questions[qi][k]=v; if(k==='prompt'){ const el=document.querySelector('.q-item.expanded .q-prompt'); if(el)el.textContent=v||'No prompt set'; renderSidebar(); } } }
function updateAnswer(qi,ai,k,v){ const s=getActiveSetting(); if(s)s.questions[qi].answers[ai][k]=v; }
function updateWeight(qi,ai,axis,id,v){ const s=getActiveSetting(); if(s)s.questions[qi].answers[ai].weights[axis][id]=v; }

function render(){
  renderSidebar();
  renderTopNav();
  const c=document.getElementById('content');
  if(state.view==='editor')c.innerHTML=renderEditor();
  else if(state.view==='questions')c.innerHTML=renderQuestions();
  else if(state.view==='visualizer')c.innerHTML=renderVisualizer();
}

render();
</script>
</body>
</html>
